server {
    # Basic server configuration
    listen 80;                     # Listen on port 80 for HTTP
    #listen 443 ssl;              # Commented SSL configuration for future use
    #listen [::]:443 ssl;         # IPv6 SSL configuration
    server_name default_server;    # Default server name
    
    # SSL certificate configuration (currently disabled)
    #ssl_certificate /home/cert/server.net.crt;
    #ssl_certificate_key /home/cert/server.key;

    # File upload size limit configuration
    client_max_body_size 300M;    # Set maximum file upload size to 300MB

    # Enable gzip compression for various content types
    gzip_types text/plain text/css application/json application/x-javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Main application location block
    # Angular output: dist/sso-portal/browser/ -> COPY dist/ -> html/sso-portal/browser/
    location / {
        root /usr/share/nginx/html/sso-portal/browser;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API endpoint proxy configuration
    location /api {
        proxy_ssl_server_name on;
        rewrite /api/(.*) /$1 break;
        proxy_pass ${APP_API_URL};
    }
}
