#SERVICES
services:
  sso-portal-spa:
    hostname: sso-portal-spa
    container_name: sso-portal-spa
    image: itsofteiu/sso-portal-spa:${APP_VERSION}
    build: .

    environment:
      TZ: Asia/Ho_Chi_Minh
      APP_API_URL: ${APP_API_URL}

    restart: always
    platform: linux/amd64
    networks:
      - web-net
    ports:
      - 1042:80

#NETWORK
networks:
  web-net:
    external: true
